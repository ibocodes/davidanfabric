<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Browse premium Ankara fabrics, African prints, bags, and fashion at the Enny Brands store. Quality textiles shipped across Nigeria."
    />
    <meta
      name="keywords"
      content="Ankara fabric store, African print shop, Nigerian fashion, Enny Brands, Davidan Fabric, buy fabric online Nigeria"
    />
    <meta name="author" content="Enny Brands" />
    <title>Store — Premium Ankara Fabrics &amp; Fashion | Enny Brands</title>

    <!-- Preconnect to CDN origins -->
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />

    <!-- Font Awesome — async (non-render-blocking) -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        crossorigin="anonymous"
      />
    </noscript>

    <!-- NO Bootstrap. NO Tailwind CDN. NO Flowbite. Single CSS system. -->
    <style>
      /* ============================================================
         DESIGN TOKENS — mirrors index.html tokens exactly
      ============================================================ */
      :root {
        --color-bg: #ffffff;
        --color-surface: #f9f9f7;
        --color-nav: #1a1a1a;
        --color-nav-text: #ffffff;
        --color-text-primary: #1a1a1a;
        --color-text-muted: #6b6b6b;
        --color-accent: #b5873a;
        --color-accent-hover: #9a7030;
        --color-border: #e5e5e0;
        --color-badge: #c0392b;
        --color-wishlist-active: #c0392b;
        --color-social-whatsapp: #25d366;
        --font-display: 'Georgia', 'Times New Roman', serif;
        --font-body: system-ui, -apple-system, sans-serif;
        --radius-sm: 6px;
        --radius-md: 12px;
        --radius-lg: 20px;
        --shadow-card: 0 2px 16px rgba(0, 0, 0, 0.08);
        --shadow-hover: 0 8px 28px rgba(0, 0, 0, 0.14);
        --transition: 0.28s cubic-bezier(0.4, 0, 0.2, 1);
      }

      /* ============================================================
         RESET & BASE
      ============================================================ */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { scroll-behavior: smooth; }
      body {
        font-family: var(--font-body);
        background: var(--color-surface);
        color: var(--color-text-primary);
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
      }
      img { display: block; max-width: 100%; }
      a { text-decoration: none; color: inherit; }
      button { cursor: pointer; border: none; background: none; font-family: inherit; }

      /* ============================================================
         NAVBAR — identical structure to index.html
      ============================================================ */
      .navbar {
        background: var(--color-nav);
        position: sticky;
        top: 0;
        z-index: 100;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
      }
      .navbar__inner {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 1rem;
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: relative;
      }
      .navbar__brand {
        color: var(--color-nav-text);
        font-family: var(--font-display);
        font-size: 1.1rem;
        letter-spacing: 0.12em;
        font-weight: 700;
        text-transform: uppercase;
        flex-shrink: 0;
      }
      .navbar__links {
        display: flex;
        gap: 0.25rem;
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
      }
      .navbar__links a {
        color: var(--color-nav-text);
        padding: 0.4rem 0.85rem;
        border-radius: var(--radius-sm);
        font-size: 0.875rem;
        font-weight: 500;
        transition: background var(--transition);
        white-space: nowrap;
      }
      .navbar__links a:hover { background: rgba(255, 255, 255, 0.12); }
      .navbar__links a[aria-current="page"] {
        background: rgba(255, 255, 255, 0.18);
        font-weight: 700;
      }
      .navbar__actions {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        flex-shrink: 0;
      }
      .cart-btn {
        position: relative;
        padding: 0.5rem;
        border-radius: 50%;
        color: var(--color-nav-text);
        transition: background var(--transition);
      }
      .cart-btn:hover { background: rgba(255, 255, 255, 0.12); }
      .cart-btn svg { width: 28px; height: 28px; stroke: currentColor; fill: none; }
      #cart-count {
        position: absolute;
        top: 0;
        right: 0;
        background: var(--color-badge);
        color: #fff;
        font-size: 0.65rem;
        font-weight: 700;
        border-radius: 999px;
        padding: 0.1rem 0.35rem;
        display: none;
        min-width: 18px;
        text-align: center;
        line-height: 1.4;
      }
      .menu-toggle {
        display: none;
        padding: 0.4rem;
        border-radius: var(--radius-sm);
        color: var(--color-nav-text);
        transition: background var(--transition);
      }
      .menu-toggle:hover { background: rgba(255, 255, 255, 0.12); }
      .menu-toggle svg { width: 24px; height: 24px; display: block; }
      .menu-toggle .icon-close { display: none; }

      .mobile-menu {
        display: none;
        background: var(--color-nav);
        padding: 0.5rem 1rem 1rem;
      }
      .mobile-menu a {
        display: block;
        color: var(--color-nav-text);
        padding: 0.6rem 0.75rem;
        border-radius: var(--radius-sm);
        font-size: 0.95rem;
        font-weight: 500;
        transition: background var(--transition);
      }
      .mobile-menu a:hover { background: rgba(255, 255, 255, 0.1); }
      .mobile-menu a[aria-current="page"] { background: rgba(255, 255, 255, 0.15); }
      .mobile-menu.is-open { display: block; }

      @media (max-width: 639px) {
        .navbar__links { display: none; }
        .menu-toggle { display: block; }
      }
      @media (min-width: 640px) {
        .mobile-menu { display: none !important; }
      }

      /* ============================================================
         STORE HERO BANNER
      ============================================================ */
      .store-hero {
        width: 100%;
        max-height: 340px;
        overflow: hidden;
        position: relative;
      }
      .store-hero img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center top;
      }
      .store-hero__overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(to bottom, transparent 40%, rgba(0,0,0,0.45));
        display: flex;
        align-items: flex-end;
        padding: 2rem;
      }
      .store-hero__title {
        color: #fff;
        font-family: var(--font-display);
        font-size: clamp(1.6rem, 5vw, 2.8rem);
        font-weight: 700;
        line-height: 1.15;
        letter-spacing: 0.02em;
        text-shadow: 0 2px 12px rgba(0,0,0,0.5);
      }

      /* ============================================================
         STORE LAYOUT WRAPPER
      ============================================================ */
      .store-wrapper {
        max-width: 1280px;
        margin: 0 auto;
        padding: 2rem 1rem 4rem;
      }

      /* ============================================================
         STORE HEADER ROW (title + result count)
      ============================================================ */
      .store-header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-bottom: 1.5rem;
        padding-bottom: 1rem;
        border-bottom: 1px solid var(--color-border);
      }
      .store-header__title {
        font-family: var(--font-display);
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--color-text-primary);
      }
      .store-header__count {
        font-size: 0.875rem;
        color: var(--color-text-muted);
      }

      /* ============================================================
         PRODUCT GRID
         script.js looks for #product-container and inserts .product-card
         elements. The grid is defined here; card styles below.
      ============================================================ */
      #product-container {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 1rem;
      }

      @media (min-width: 600px) {
        #product-container { grid-template-columns: repeat(2, 1fr); gap: 1.25rem; }
      }
      @media (min-width: 768px) {
        #product-container { grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
      }
      @media (min-width: 1024px) {
        #product-container { grid-template-columns: repeat(4, 1fr); gap: 1.5rem; }
      }
      @media (min-width: 1280px) {
        #product-container { grid-template-columns: repeat(5, 1fr); gap: 1.75rem; }
      }

      /* ============================================================
         PRODUCT CARD
         These classes are injected by script.js's initProductGrid().
         Defining them here so the JS-generated markup is styled correctly.
      ============================================================ */
      .product-card {
        background: var(--color-bg);
        border-radius: var(--radius-md);
        overflow: hidden;
        box-shadow: var(--shadow-card);
        transition: box-shadow var(--transition), transform var(--transition);
        display: flex;
        flex-direction: column;
      }
      .product-card:hover {
        box-shadow: var(--shadow-hover);
        transform: translateY(-3px);
      }

      /* Image wrapper */
      .product-card__img-wrap {
        overflow: hidden;
        aspect-ratio: 3 / 4;
        background: var(--color-surface);
      }
      .product-card__img-wrap img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.55s ease;
      }
      .product-card:hover .product-card__img-wrap img {
        transform: scale(1.06);
      }

      /* Actions bar below image */
      .product-card__actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.5rem 0.65rem;
        border-top: 1px solid var(--color-border);
        gap: 0.25rem;
      }

      /* Wishlist (heart) button */
      .btn-wishlist {
        font-size: 1.15rem;
        color: var(--color-text-muted);
        padding: 0.25rem 0.4rem;
        border-radius: var(--radius-sm);
        transition: color var(--transition), background var(--transition);
        line-height: 1;
        flex-shrink: 0;
      }
      .btn-wishlist:hover { color: var(--color-wishlist-active); }
      /* script.js adds .fa-solid.fa-heart when wishlisted — style it red */
      .btn-wishlist .fa-solid.fa-heart,
      .btn-wishlist .red-heart {
        color: var(--color-wishlist-active);
      }

      /* CTA group: WhatsApp + cart */
      .product-card__cta {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .product-card__cta a,
      .product-card__cta button {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        transition: background var(--transition), color var(--transition), transform var(--transition);
        font-size: 1.1rem;
        color: var(--color-text-muted);
      }
      .product-card__cta a:hover {
        background: var(--color-social-whatsapp);
        color: #fff;
        transform: scale(1.1);
      }
      .product-card__cta .btn-add-cart:hover {
        background: var(--color-nav);
        color: #fff;
        transform: scale(1.1);
      }
      .product-card__cta .btn-add-cart svg {
        width: 20px;
        height: 20px;
        stroke: currentColor;
        fill: none;
      }

      /* ============================================================
         EMPTY STATE (shown before JS renders, or if no images)
      ============================================================ */
      .store-empty {
        grid-column: 1 / -1;
        text-align: center;
        padding: 4rem 1rem;
        color: var(--color-text-muted);
        font-family: var(--font-display);
        font-style: italic;
        font-size: 1.1rem;
      }

      /* ============================================================
         FOOTER — matches index.html
      ============================================================ */
      .site-footer {
        background: var(--color-bg);
        border-top: 1px solid var(--color-border);
        padding: 1.5rem 1rem;
        margin-top: 1rem;
      }
      .footer-social {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 1.5rem;
      }
      .footer-social a {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: var(--color-border);
        color: var(--color-text-primary);
        transition: background var(--transition), color var(--transition), transform var(--transition);
      }
      .footer-social a:hover { transform: translateY(-3px); }
      .footer-social a svg,
      .footer-social a i { width: 20px; height: 20px; font-size: 1.1rem; }
      .footer-social a.twitter:hover   { background: #1da1f2; color: #fff; }
      .footer-social a.facebook:hover  { background: #1877f2; color: #fff; }
      .footer-social a.instagram:hover { background: #e1306c; color: #fff; }
      .footer-social a.whatsapp:hover  { background: #25d366; color: #fff; }
    </style>
  </head>

  <body>

    <!-- ============================================================
         NAVBAR
         IDs required by script.js:
           #buttonMenu  — mobile toggle button
           #mobile-menu — mobile drawer
           #cart        — cart button (not used as query target, but kept for parity)
           #cart-count  — badge updated by window.Cart
         Classes required by script.js:
           .icon-open   — hamburger icon (shown when menu closed)
           .icon-close  — X icon (shown when menu open)
    ============================================================ -->
    <nav class="navbar" aria-label="Main navigation">
      <div class="navbar__inner">

        <a href="index.html" class="navbar__brand" aria-label="Davidan Fabric — home">
          DAVIDANFABRIC
        </a>

        <div class="navbar__links" role="list">
          <a href="index.html" role="listitem">Home</a>
          <!-- Store is the current page -->
          <a href="store.html" role="listitem" aria-current="page">Store</a>
          <a href="cloth.html" role="listitem">Clothes</a>
          <a href="bag.html" role="listitem">Bags</a>
        </div>

        <div class="navbar__actions">
          <button
            class="cart-btn"
            id="cart"
            aria-label="View cart"
            type="button"
          >
            <svg
              aria-hidden="true"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M4 4h1.5L8 16m0 0h8m-8 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4Zm8 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4Zm.75-3H7.5M11 7H6.312M17 4v6m-3-3h6"
              />
            </svg>
            <span
              id="cart-count"
              aria-live="polite"
              aria-label="Items in cart"
            >0</span>
          </button>

          <button
            id="buttonMenu"
            class="menu-toggle"
            type="button"
            aria-controls="mobile-menu"
            aria-expanded="false"
            aria-label="Toggle navigation menu"
          >
            <svg class="icon-open" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/>
            </svg>
            <svg class="icon-close" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="mobile-menu" id="mobile-menu" role="menu">
        <a href="index.html" role="menuitem">Home</a>
        <a href="store.html" role="menuitem" aria-current="page">Store</a>
        <a href="cloth.html" role="menuitem">Clothes</a>
        <a href="bag.html" role="menuitem">Bags</a>
      </div>
    </nav>

    <main id="main-content">

      <!-- Store hero banner
           FIX: alt was empty string
           FIX: explicit width/height prevent layout shift (CLS)
           FIX: fetchpriority="high" — above the fold, load first -->
      <section aria-label="Store hero">
        <div class="store-hero">
          <img
            src="image/landingpage.webp"
            alt="Vibrant collection of Ankara fabrics and African fashion at Enny Brands store"
            width="1280"
            height="340"
            fetchpriority="high"
          />
          <div class="store-hero__overlay">
            <h1 class="store-hero__title">The Collection</h1>
          </div>
        </div>
      </section>

      <!-- Product grid
           FIX: Unclosed <section> tag removed — was left dangling in original
           FIX: #product-container is the exact ID script.js queries
           script.js initProductGrid() inserts .product-card children here.
           The grid columns are controlled by CSS above, not inline classes. -->
      <section aria-label="Product grid" class="store-wrapper">
        <div class="store-header">
          <h2 class="store-header__title">All Products</h2>
          <span class="store-header__count" id="product-count" aria-live="polite"></span>
        </div>

        <div
          id="product-container"
          role="list"
          aria-label="Product listing"
        >
          <!-- Products are injected here by script.js → initProductGrid() -->
          <!-- Fallback shown before JS runs or if JS fails -->
          <p class="store-empty" aria-live="polite">Loading products…</p>
        </div>
      </section>

    </main>

    <!-- FOOTER — matches index.html -->
    <footer class="site-footer">
      <nav class="footer-social" aria-label="Social media links">
        <a href="#" class="twitter" aria-label="Follow us on Twitter">
          <svg fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M8.29 20c7.547 0 11.675-6.155 11.675-11.49 0-.175 0-.349-.012-.522A8.18 8.18 0 0022 5.92a8.19 8.19 0 01-2.357.636A4.077 4.077 0 0021.448 4.1a8.14 8.14 0 01-2.605.975 4.1 4.1 0 00-6.993 3.734A11.65 11.65 0 013 4.89a4.05 4.05 0 001.27 5.456A4.07 4.07 0 012.8 9.71v.05a4.1 4.1 0 003.292 4.017 4.09 4.09 0 01-1.852.07 4.1 4.1 0 003.834 2.823A8.233 8.233 0 012 18.407a11.616 11.616 0 006.29 1.84"/>
          </svg>
        </a>
        <a href="#" class="facebook" aria-label="Follow us on Facebook">
          <svg fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M22 12.07C22 6.477 17.523 2 12 2S2 6.477 2 12.07c0 5.012 3.657 9.165 8.438 9.878v-6.99H7.898v-2.888h2.54V9.797c0-2.507 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.774-1.63 1.562v1.875h2.773l-.443 2.889h-2.33v6.99C18.343 21.235 22 17.081 22 12.07z"/>
          </svg>
        </a>
        <a href="#" class="instagram" aria-label="Follow us on Instagram">
          <svg fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M7.75 2A5.75 5.75 0 002 7.75v8.5A5.75 5.75 0 007.75 22h8.5A5.75 5.75 0 0022 16.25v-8.5A5.75 5.75 0 0016.25 2h-8.5zm0 1.5h8.5A4.25 4.25 0 0120.5 7.75v8.5a4.25 4.25 0 01-4.25 4.25h-8.5a4.25 4.25 0 01-4.25-4.25v-8.5A4.25 4.25 0 017.75 3.5zM12 7a5 5 0 100 10 5 5 0 000-10zm0 1.5a3.5 3.5 0 110 7 3.5 3.5 0 010-7zm5.25-.75a.75.75 0 100 1.5.75.75 0 000-1.5z"/>
          </svg>
        </a>
        <a href="#" class="whatsapp" aria-label="Contact us on WhatsApp">
          <i class="fa-brands fa-whatsapp" aria-hidden="true"></i>
        </a>
      </nav>
    </footer>

    <!--
      Script load order matters:
      1. script.js — runs initProductGrid() which populates #product-container
      2. bag.js    — any bag-specific logic runs after the grid is ready

      Both scripts are deferred automatically because they are at end of <body>.
      DO NOT move them to <head> without adding defer attribute.
    -->
    <script src="script.js"></script>
    <script src="bag.js"></script>

    <!-- Remove "Loading products…" fallback text once JS has run -->
    <script>
      (function clearFallback() {
        const container = document.getElementById('product-container');
        const fallback  = container && container.querySelector('.store-empty');
        if (fallback && container.children.length > 1) {
          fallback.remove();
        }
        // Update product count label
        const countEl = document.getElementById('product-count');
        if (countEl && container) {
          const n = container.querySelectorAll('.product-card').length;
          if (n > 0) countEl.textContent = n + ' items';
        }
      })();
    </script>

  </body>
</html>
